<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha D&D 5e 2024</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BARRA DE PESTAÑAS -->
<div class="barra-pestanas" id="barra-pestanas">
    <button class="btn-nueva-pestana" id="btn-nueva-pestana" onclick="nuevaFicha()" title="Nueva ficha">＋</button>
</div>

<!-- LOG DE TIRADAS -->
<div id="log-tiradas" class="log-contenedor">
    <div class="log-cabecera">
        <span>⚄ LOG DE TIRADAS</span>
        <button onclick="limpiarLog()">✖</button>
    </div>
    <div id="log-lista"></div>
</div>

<!-- CONTENEDOR DE FICHAS -->
<div id="fichas-contenedor"></div>

<!-- WIDGET DADOS -->
<div id="dados-widget" class="dados-widget">
    <div class="dados-widget-cabecera" onclick="toggleDadosWidget()" title="Minimizar / Expandir">
        <span>&#127922; Dados</span>
        <span class="dados-min-arrow">&#9650;</span>
    </div>
    <div class="dados-widget-body">
        <div id="dados-filas" class="dados-filas"></div>
        <button class="dados-add-btn" onclick="dadosAddFila(false)">+ Más dados</button>
        <button class="dados-tirar-btn" onclick="dadosRealizarTirada()">&#127922; Realizar Tirada</button>
    </div>
</div>




<!-- PLANTILLA DE FICHA -->
<template id="plantilla-ficha">
<div class="hoja-contenedor ficha-panel">

    <!-- CABECERA -->
    <header class="cabecera-principal">
        <div class="bloque-nombre">
            <input type="text" class="input-nombre" placeholder="Nombre del Personaje" oninput="onNombreCambia(this)">
            <label>Nombre del Personaje</label>
        </div>
        <div class="bloque-clase-info">
            <div class="fila-input">
                <div class="campo campo-sm"><input type="text" placeholder="Ej: Guerrero 5"><label>Clase y Nivel</label></div>
                <div class="campo campo-sm"><input type="text" placeholder="Ej: Humano"><label>Especie</label></div>
                <div class="campo campo-sm"><input type="text" placeholder="Ej: Soldado"><label>Trasfondo</label></div>
            </div>
        </div>
        <div class="bloque-inspiracion" onclick="toggleInspiracion(this)" title="Inspiración Heroica">
            <div class="inspiracion-estrella">✦</div>
            <label>Inspiración</label>
        </div>
        <div class="bloque-pb">
            <label>Bono de Competencia</label>
            <input type="number" class="pb-input" value="2" oninput="actualizarTodo(this)">
        </div>
    </header>

    <!-- BARRA DE CONTROLES: ventaja/desventaja | CA+INI+VEL (centro) | descansos -->
    <div class="controles-accion">
        <div class="grupo-dados">
            <button class="btn-tirada btn-ventaja" onclick="toggleDados(this,'ventaja')">▲ VENTAJA</button>
            <button class="btn-tirada btn-desventaja" onclick="toggleDados(this,'desventaja')">▼ DESVENTAJA</button>
        </div>

        <!-- CA + INICIATIVA + VELOCIDADES integrados en la barra -->
        <div class="combate-inline">
            <div class="caja-stat-inline">
                <span class="csi-label">CA</span>
                <input type="number" value="10" class="csi-input" oninput="guardarDebounced()">
            </div>
            <div class="caja-stat-inline rollable" onclick="realizarTiradaInput(this,'Iniciativa')">
                <span class="csi-label">Iniciativa</span>
                <input type="number" class="csi-input ini-val" value="0" onclick="event.stopPropagation()" oninput="actualizarIniBonus(this)">
            </div>
            <div class="sep-inline"></div>
            <div class="vel-inline-bloque">
                <span class="vel-inline-titulo">Velocidad</span>
                <div class="vel-inline-fila">
                    <div class="vel-inline-item">
                        <input type="text" value="30 ft" class="vel-inline-input vel-grande" oninput="guardarDebounced()">
                        <label>Andar</label>
                    </div>
                    <div class="vel-inline-item">
                        <input type="text" placeholder="—" class="vel-inline-input" oninput="guardarDebounced()">
                        <label>Nadar</label>
                    </div>
                    <div class="vel-inline-item">
                        <input type="text" placeholder="—" class="vel-inline-input" oninput="guardarDebounced()">
                        <label>Escalar</label>
                    </div>
                    <div class="vel-inline-item">
                        <input type="text" placeholder="—" class="vel-inline-input" oninput="guardarDebounced()">
                        <label>Volar</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="grupo-descansos">
            <button class="btn-descanso" onclick="descansoCorto(this)">☽ Descanso Corto</button>
            <button class="btn-descanso btn-descanso-largo" onclick="descansoLargo(this)">☀ Descanso Largo</button>
        </div>
    </div>

    <!-- REJILLA PRINCIPAL -->
    <main class="rejilla-ficha">

        <!-- COL IZQUIERDA: ESTADÍSTICAS -->
        <aside class="columna-stats">
            <div class="seccion-caja">
                <h3 class="titulo-caja">Estadísticas</h3>
                <div class="stats-lista">

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Fuerza')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Fuerza</span>
                                <input type="number" class="stat-score" data-stat="str" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="str">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Fuerza')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="str" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <span class="salv-valor" data-salv="str">+0</span>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Destreza')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Destreza</span>
                                <input type="number" class="stat-score" data-stat="dex" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="dex">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Destreza')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="dex" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <span class="salv-valor" data-salv="dex">+0</span>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Constitución')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Constitución</span>
                                <input type="number" class="stat-score" data-stat="con" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="con">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Constitución')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="con" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <span class="salv-valor" data-salv="con">+0</span>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Inteligencia')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Inteligencia</span>
                                <input type="number" class="stat-score" data-stat="int" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="int">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Inteligencia')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="int" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <span class="salv-valor" data-salv="int">+0</span>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Sabiduría')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Sabiduría</span>
                                <input type="number" class="stat-score" data-stat="wis" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="wis">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Sabiduría')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="wis" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <span class="salv-valor" data-salv="wis">+0</span>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Carisma')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Carisma</span>
                                <input type="number" class="stat-score" data-stat="cha" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="cha">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Carisma')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="cha" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <span class="salv-valor" data-salv="cha">+0</span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- CAJA DE SENTIDOS (bajo Estadísticas) -->
            <div class="seccion-caja seccion-sentidos">
                <h3 class="titulo-caja">Sentidos</h3>
                <div class="sentido-fila">
                    <div class="sentido-valor percepcion-pasiva">10</div>
                    <label>Percepción Pasiva <span class="sentido-stat">(Sab)</span></label>
                </div>
                <div class="sentido-fila">
                    <div class="sentido-valor perspicacia-pasiva">10</div>
                    <label>Perspicacia Pasiva <span class="sentido-stat">(Sab)</span></label>
                </div>
                <div class="sentido-fila sentido-fila-last">
                    <div class="sentido-valor investigacion-pasiva">10</div>
                    <label>Investigación Pasiva <span class="sentido-stat">(Int)</span></label>
                </div>
                <textarea class="sentidos-extra" placeholder="Ej: Visión en la oscuridad 18 m., Sentido ciego 3 m..." oninput="guardarDebounced()"></textarea>
            </div>

        </aside>

        <!-- COL CENTRAL: HABILIDADES + COMPETENCIAS -->
        <section class="columna-habilidades">
            <div class="seccion-caja">
                <h3 class="titulo-caja">Habilidades</h3>
                <div class="cabecera-habilidades">
                    <span class="etiqueta-pe" title="Competencia">P</span>
                    <span class="etiqueta-pe" title="Expertise">E</span>
                    <span class="etiqueta-mod">Bono</span>
                    <span class="etiqueta-nombre">Habilidad</span>
                    <span class="etiqueta-adv" title="Ventaja / Desventaja permanente">¿Ven?</span>
                </div>
                <div class="lista-habilidades">
                    <div class="fila-skill rollable" data-stat="str" onclick="tirarDesdeFila(this,'Atletismo')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Atletismo <small>(Fue)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="dex" onclick="tirarDesdeFila(this,'Acrobacias')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Acrobacias <small>(Des)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="wis" onclick="tirarDesdeFila(this,'Trato con Animales')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Trato con Animales <small>(Sab)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="int" onclick="tirarDesdeFila(this,'Arcanos')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Arcanos <small>(Int)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="int" onclick="tirarDesdeFila(this,'Historia')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Historia <small>(Int)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="cha" onclick="tirarDesdeFila(this,'Intimidación')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Intimidación <small>(Car)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable fila-investigacion" data-stat="int" onclick="tirarDesdeFila(this,'Investigación')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Investigación <small>(Int)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="wis" onclick="tirarDesdeFila(this,'Medicina')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Medicina <small>(Sab)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="int" onclick="tirarDesdeFila(this,'Naturaleza')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Naturaleza <small>(Int)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable fila-percepcion" data-stat="wis" onclick="tirarDesdeFila(this,'Percepción')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Percepción <small>(Sab)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable fila-perspicacia" data-stat="wis" onclick="tirarDesdeFila(this,'Perspicacia')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Perspicacia <small>(Sab)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="cha" onclick="tirarDesdeFila(this,'Interpretación')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Interpretación <small>(Car)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="cha" onclick="tirarDesdeFila(this,'Persuasión')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Persuasión <small>(Car)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="int" onclick="tirarDesdeFila(this,'Religión')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Religión <small>(Int)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="dex" onclick="tirarDesdeFila(this,'Juego de Manos')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Juego de Manos <small>(Des)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="dex" onclick="tirarDesdeFila(this,'Sigilo')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Sigilo <small>(Des)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="wis" onclick="tirarDesdeFila(this,'Supervivencia')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><span class="mod-valor">+0</span><label>Supervivencia <small>(Sab)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                </div>
            </div>

            <div class="seccion-caja seccion-competencias">
                <h3 class="titulo-caja">Otras Competencias</h3>
                <div class="bloque-competencia"><label>Idiomas</label><textarea placeholder="Ej: Común, Élfico, Enano..." oninput="guardarDebounced()"></textarea></div>
                <div class="bloque-competencia"><label>Herramientas y Otros</label><textarea placeholder="Ej: Herramientas de Ladrón..." oninput="guardarDebounced()"></textarea></div>
                <div class="bloque-competencia"><label>Armas y Armaduras</label><textarea placeholder="Ej: Armas Marciales, Armadura Pesada..." oninput="guardarDebounced()"></textarea></div>
            </div>
        </section>

        <!-- COL DERECHA: VIDA → RESISTENCIAS → DADOS/MUERTE → INVENTARIO -->
        <section class="columna-combate">

            <!-- PUNTOS DE GOLPE (ahora arriba del todo, mismo nivel que stats) -->
            <div class="seccion-vida">
                <div class="cabecera-vida">
                    <span>Puntos de Golpe</span>
                    <div class="hp-inputs">
                        <input type="number" class="hp-actual" value="10" oninput="actualizarVidaPanel(this)">
                        <span class="separador-hp">/</span>
                        <input type="number" class="hp-max" value="10" oninput="actualizarVidaPanel(this)">
                    </div>
                </div>
                <div class="barra-vida-contenedor">
                    <div class="barra-relleno verde" style="width:100%"></div>
                    <div class="barra-relleno azul"></div>
                </div>
                <div class="hp-controles">
                    <div class="hp-temp"><label>PG Temporales</label><input type="number" class="hp-temp-val" value="0" oninput="actualizarVidaPanel(this)"></div>
                    <div class="hp-calculadora">
                        <button class="btn-hp daño" onclick="modificarVidaPanel(this,'daño')">− DAÑO</button>
                        <input type="number" class="hp-mod" value="1" min="0">
                        <button class="btn-hp cura" onclick="modificarVidaPanel(this,'cura')">+ CURA</button>
                    </div>
                </div>
            </div>

            <!-- RESISTENCIAS E INMUNIDADES -->
            <div class="seccion-caja seccion-resistencias">
                <h3 class="titulo-caja">Resistencias e Inmunidades</h3>
                <div class="resistencias-grid">
                    <div class="res-grupo">
                        <label>Resistencias al daño</label>
                        <textarea class="res-textarea" placeholder="Ej: Fuego, Cortante no mágico..." oninput="guardarDebounced()"></textarea>
                    </div>
                    <div class="res-grupo">
                        <label>Inmunidades al daño</label>
                        <textarea class="res-textarea" placeholder="Ej: Veneno, Psíquico..." oninput="guardarDebounced()"></textarea>
                    </div>
                    <div class="res-grupo">
                        <label>Inmunidades a condiciones</label>
                        <textarea class="res-textarea" placeholder="Ej: Envenenado, Asustado..." oninput="guardarDebounced()"></textarea>
                    </div>
                </div>
            </div>

            <!-- DADOS DE GOLPE + SALVACIONES MUERTE -->
            <div class="fila-dados-muerte">
                <div class="seccion-caja dados-golpe">
                    <h3 class="titulo-caja">Dados de Golpe
                        <button class="dg-add-grupo-btn" onclick="dgAñadirGrupo(this)" title="Añadir otro tipo de dado de golpe">＋</button>
                    </h3>
                    <div class="dg-grupos-wrap"></div>
                    <p class="dg-hint">Desmarca un dado para gastarlo y curar PG</p>
                </div>

                <div class="seccion-caja salvaciones-muerte">
                    <h3 class="titulo-caja">Salvaciones Muerte</h3>
                    <div class="grupo-muerte">
                        <div class="muerte-fila">
