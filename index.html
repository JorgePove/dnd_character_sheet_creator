<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha D&D 5e 2024</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dados-widget.css">
</head>
<body>

<!-- BARRA DE PESTAÑAS -->
<div class="barra-pestanas" id="barra-pestanas">
    <button class="btn-nueva-pestana" id="btn-nueva-pestana" onclick="nuevaFicha()" title="Nueva ficha">＋</button>
    <div class="barra-acciones-globales">
        <button class="btn-global" onclick="exportarFichasJSON()" title="Exportar todas las fichas a JSON">⬇ Exportar</button>
        <label class="btn-global btn-importar" title="Importar fichas desde JSON">
            ⬆ Importar
            <input type="file" accept=".json" onchange="importarFichasJSON(event)" style="display:none">
        </label>
        <button class="btn-global btn-pdf" onclick="exportarFichaPDF()" title="Exportar ficha activa a PDF">🖨 PDF</button>
        <button class="btn-global btn-compartir" onclick="compartirFicha()" title="Generar URL compartible de la ficha activa">🔗 Compartir</button>
        <button class="btn-tema-global" onclick="toggleTema()" title="Cambiar tema">☀️</button>
    </div>
</div>

<!-- LOG DE TIRADAS -->
<div id="log-tiradas" class="log-contenedor">
    <div class="log-cabecera">
        <span>⚄ LOG DE TIRADAS</span>
        <button onclick="limpiarLog()">✖</button>
    </div>
    <div id="log-lista"></div>
</div>

<!-- CONTENEDOR DE FICHAS -->
<div id="fichas-contenedor"></div>

<!-- PLANTILLA DE FICHA -->
<template id="plantilla-ficha">
<div class="hoja-contenedor ficha-panel">

    <!-- CABECERA -->
    <header class="cabecera-principal">
        <div class="bloque-nombre">
            <input type="text" class="input-nombre" placeholder="Nombre" oninput="onNombreCambia(this)">
            <label>Nombre del Personaje</label>
        </div>
        <div class="bloque-clase-info">
            <div class="fila-input">
                <div class="campo campo-multiclase campo-mc-corto">
                    <div class="multiclase-widget">
                        <div class="multiclase-lista"></div>
                        <button type="button" class="multiclase-add-btn" onclick="multiclaseAñadir(this)" title="Añadir clase">+ Clase</button>
                    </div>
                    <label>Clase y Nivel</label>
                </div>
                <div class="bloque-especie-trasfondo bloque-et-corto">
                    <div class="campo-cab-sel">
                        <select class="cab-select sel-especie-cab" onchange="onEspecieCabChange(this)">
                            <option value="">— Especie —</option>
                        </select>
                        <label>Especie</label>
                    </div>
                    <div class="campo-cab-sel">
                        <select class="cab-select sel-trasfondo-cab" onchange="onTrasfondoCabChange(this)">
                            <option value="">— Trasfondo —</option>
                        </select>
                        <label>Trasfondo</label>
                    </div>
                </div>
            </div>
        </div>
        <!-- RETRATO DE PERSONAJE -->
        <div class="retrato-cab-contenedor"
             ondragover="event.preventDefault()"
             ondrop="retratoDropImagen(event,this)"
             title="Arrastra una imagen o haz clic para cargar el retrato">
            <img class="retrato-cab-img" style="display:none" alt="Retrato">
            <div class="retrato-cab-placeholder">
                <span class="retrato-cab-icono">🎭</span>
                <span class="retrato-cab-texto">Retrato</span>
            </div>
            <label class="retrato-cab-label">
                <input type="file" accept="image/*" onchange="retratoCargarImagen(event,this)" style="display:none">
            </label>
            <button class="retrato-cab-borrar" onclick="retratoBorrarImagen(this)" title="Quitar retrato" style="display:none">×</button>
        </div>
    </header>

    <!-- BARRA DE CONTROLES: CA+INI+VEL (izquierda) | Inspiración+PB (derecha) -->
    <div class="controles-accion">
        <!-- CA + INICIATIVA + VELOCIDADES integrados en la barra -->
        <div class="combate-inline">
            <div class="caja-stat-inline">
                <span class="csi-label">CA</span>
                <input type="number" value="10" class="csi-input" oninput="guardarDebounced()">
            </div>
            <div class="caja-stat-inline rollable" onclick="realizarTiradaInput(this,'Iniciativa')">
                <span class="csi-label">Iniciativa</span>
                <input type="number" class="csi-input ini-val" value="0" onclick="event.stopPropagation()" oninput="actualizarIniBonus(this)">
            </div>
            <div class="sep-inline"></div>
            <div class="vel-inline-bloque">
                <span class="vel-inline-titulo">Velocidad</span>
                <div class="vel-inline-fila">
                    <div class="vel-inline-item">
                        <input type="text" value="30 ft" class="vel-inline-input vel-grande" oninput="guardarDebounced()">
                        <label>Andar</label>
                    </div>
                    <div class="vel-inline-item">
                        <input type="text" placeholder="—" class="vel-inline-input" oninput="guardarDebounced()">
                        <label>Nadar</label>
                    </div>
                    <div class="vel-inline-item">
                        <input type="text" placeholder="—" class="vel-inline-input" oninput="guardarDebounced()">
                        <label>Escalar</label>
                    </div>
                    <div class="vel-inline-item">
                        <input type="text" placeholder="—" class="vel-inline-input" oninput="guardarDebounced()">
                        <label>Volar</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Inspiración + Bono de Competencia movidos aquí -->
        <div class="grupo-insp-pb">
            <div class="bloque-inspiracion" onclick="toggleInspiracion(this)" title="Inspiración Heroica">
                <div class="inspiracion-estrella">✦</div>
                <label>Inspiración</label>
            </div>
            <div class="bloque-pb">
                <label>Bono de Competencia</label>
                <input type="number" class="pb-input" value="2" oninput="actualizarTodo(this)">
            </div>
        </div>
    </div>

    <!-- REJILLA PRINCIPAL -->
    <main class="rejilla-ficha">

        <!-- COL IZQUIERDA: ESTADÍSTICAS -->
        <aside class="columna-stats">
            <div class="seccion-caja">
                <h3 class="titulo-caja">Estadísticas</h3>
                <div class="stats-lista">

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Fuerza')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Fuerza</span>
                                <input type="number" class="stat-score" data-stat="str" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="str">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Fuerza')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="str" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <div class="salv-ajuste" onclick="event.stopPropagation()"><div class="salv-flechas"><button class="salv-arrow" onclick="ajustarSalv(this,1)" tabindex="-1">▲</button><button class="salv-arrow" onclick="ajustarSalv(this,-1)" tabindex="-1">▼</button></div><input type="number" class="salv-valor" data-salv="str" value="0" data-salv-override="false" oninput="onSalvValorEdit(this)" ondblclick="onSalvValorReset(this)" onclick="event.stopPropagation()" title="Editar · Doble clic restaura"></div>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Destreza')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Destreza</span>
                                <input type="number" class="stat-score" data-stat="dex" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="dex">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Destreza')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="dex" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <div class="salv-ajuste" onclick="event.stopPropagation()"><div class="salv-flechas"><button class="salv-arrow" onclick="ajustarSalv(this,1)" tabindex="-1">▲</button><button class="salv-arrow" onclick="ajustarSalv(this,-1)" tabindex="-1">▼</button></div><input type="number" class="salv-valor" data-salv="dex" value="0" data-salv-override="false" oninput="onSalvValorEdit(this)" ondblclick="onSalvValorReset(this)" onclick="event.stopPropagation()" title="Editar · Doble clic restaura"></div>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Constitución')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Constitución</span>
                                <input type="number" class="stat-score" data-stat="con" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="con">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Constitución')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="con" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <div class="salv-ajuste" onclick="event.stopPropagation()"><div class="salv-flechas"><button class="salv-arrow" onclick="ajustarSalv(this,1)" tabindex="-1">▲</button><button class="salv-arrow" onclick="ajustarSalv(this,-1)" tabindex="-1">▼</button></div><input type="number" class="salv-valor" data-salv="con" value="0" data-salv-override="false" oninput="onSalvValorEdit(this)" ondblclick="onSalvValorReset(this)" onclick="event.stopPropagation()" title="Editar · Doble clic restaura"></div>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Inteligencia')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Inteligencia</span>
                                <input type="number" class="stat-score" data-stat="int" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="int">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Inteligencia')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="int" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <div class="salv-ajuste" onclick="event.stopPropagation()"><div class="salv-flechas"><button class="salv-arrow" onclick="ajustarSalv(this,1)" tabindex="-1">▲</button><button class="salv-arrow" onclick="ajustarSalv(this,-1)" tabindex="-1">▼</button></div><input type="number" class="salv-valor" data-salv="int" value="0" data-salv-override="false" oninput="onSalvValorEdit(this)" ondblclick="onSalvValorReset(this)" onclick="event.stopPropagation()" title="Editar · Doble clic restaura"></div>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Sabiduría')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Sabiduría</span>
                                <input type="number" class="stat-score" data-stat="wis" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="wis">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Sabiduría')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="wis" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <div class="salv-ajuste" onclick="event.stopPropagation()"><div class="salv-flechas"><button class="salv-arrow" onclick="ajustarSalv(this,1)" tabindex="-1">▲</button><button class="salv-arrow" onclick="ajustarSalv(this,-1)" tabindex="-1">▼</button></div><input type="number" class="salv-valor" data-salv="wis" value="0" data-salv-override="false" oninput="onSalvValorEdit(this)" ondblclick="onSalvValorReset(this)" onclick="event.stopPropagation()" title="Editar · Doble clic restaura"></div>
                        </div>
                    </div>

                    <div class="stat-bloque">
                        <div class="stat-parte-superior" onclick="realizarTiradaStat(this,'Carisma')">
                            <div class="stat-info-izq">
                                <span class="stat-nombre">Carisma</span>
                                <input type="number" class="stat-score" data-stat="cha" value="10" oninput="actualizarAtributo(this)" onclick="event.stopPropagation()">
                            </div>
                            <div class="stat-mod-circulo" data-mod="cha">+0</div>
                        </div>
                        <div class="stat-salv" onclick="tirarSalvacionStat(this,'Salv. Carisma')">
                            <input type="checkbox" class="dot prof salv-dot" data-stat="cha" onchange="actualizarTodo(this)" onclick="event.stopPropagation()">
                            <span class="salv-label">Salvación</span>
                            <div class="salv-ajuste" onclick="event.stopPropagation()"><div class="salv-flechas"><button class="salv-arrow" onclick="ajustarSalv(this,1)" tabindex="-1">▲</button><button class="salv-arrow" onclick="ajustarSalv(this,-1)" tabindex="-1">▼</button></div><input type="number" class="salv-valor" data-salv="cha" value="0" data-salv-override="false" oninput="onSalvValorEdit(this)" ondblclick="onSalvValorReset(this)" onclick="event.stopPropagation()" title="Editar · Doble clic restaura"></div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- CAJA DE SENTIDOS (bajo Estadísticas) -->
            <div class="seccion-caja seccion-sentidos">
                <h3 class="titulo-caja">Sentidos</h3>
                <div class="sentido-fila">
                    <div class="sentido-valor percepcion-pasiva">10</div>
                    <label>Percepción Pasiva <span class="sentido-stat">(Sab)</span></label>
                </div>
                <div class="sentido-fila">
                    <div class="sentido-valor perspicacia-pasiva">10</div>
                    <label>Perspicacia Pasiva <span class="sentido-stat">(Sab)</span></label>
                </div>
                <div class="sentido-fila sentido-fila-last">
                    <div class="sentido-valor investigacion-pasiva">10</div>
                    <label>Investigación Pasiva <span class="sentido-stat">(Int)</span></label>
                </div>
                <textarea class="sentidos-extra" placeholder="Ej: Visión en la oscuridad 18 m., Sentido ciego 3 m..." oninput="guardarDebounced()"></textarea>
            </div>

        </aside>

        <!-- COL CENTRAL: HABILIDADES + COMPETENCIAS -->
        <section class="columna-habilidades">
            <div class="seccion-caja">
                <h3 class="titulo-caja">Habilidades</h3>
                <div class="cabecera-habilidades">
                    <span class="etiqueta-pe" title="Competencia">P</span>
                    <span class="etiqueta-pe" title="Expertise">E</span>
                    <span class="etiqueta-mod">Bono</span>
                    <span class="etiqueta-nombre">Habilidad</span>
                    <span class="etiqueta-adv" title="Ventaja / Desventaja permanente">¿Ven?</span>
                </div>
                <div class="lista-habilidades">
                    <div class="fila-skill rollable" data-stat="str" onclick="tirarDesdeFila(this,'Atletismo')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Atletismo <small>(Fue)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="dex" onclick="tirarDesdeFila(this,'Acrobacias')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Acrobacias <small>(Des)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="wis" onclick="tirarDesdeFila(this,'Trato con Animales')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Trato con Animales <small>(Sab)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="int" onclick="tirarDesdeFila(this,'Arcana')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Arcana <small>(Int)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="cha" onclick="tirarDesdeFila(this,'Engaño')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Engaño <small>(Car)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="int" onclick="tirarDesdeFila(this,'Historia')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Historia <small>(Int)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="cha" onclick="tirarDesdeFila(this,'Intimidación')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Intimidación <small>(Car)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable fila-investigacion" data-stat="int" onclick="tirarDesdeFila(this,'Investigación')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Investigación <small>(Int)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="wis" onclick="tirarDesdeFila(this,'Medicina')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Medicina <small>(Sab)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable" data-stat="int" onclick="tirarDesdeFila(this,'Naturaleza')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Naturaleza <small>(Int)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable fila-percepcion" data-stat="wis" onclick="tirarDesdeFila(this,'Percepción')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Percepción <small>(Sab)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>
                    <div class="fila-skill rollable fila-perspicacia" data-stat="wis" onclick="tirarDesdeFila(this,'Perspicacia')"><input type="checkbox" class="dot prof" onchange="actualizarTodo(this)" onclick="event.stopPropagation()"><input type="checkbox" class="dot exp" onchange="validarExpertise(this)" onclick="event.stopPropagation()"><input type="number" class="mod-valor" value="0" data-override="false" oninput="onModValorEdit(this)" ondblclick="onModValorReset(this)" onclick="event.stopPropagation()" title="Doble clic: restaurar cálculo automático"><label>Perspicacia <small>(Sab)</small></label><div class="adv-toggle" data-adv="0" onclick="toggleAdv(this);event.stopPropagation()"></div></div>

            <div class="seccion-caja roleplay-apariencia">

                <div class="apariencia-contenedor"
                     ondragover="event.preventDefault()"

                    <img class="apariencia-img" style="display:none" alt="Personaje">
                    <div class="apariencia-placeholder">
                        <span class="apariencia-icono">🧙</span>
                        <span class="apariencia-texto">Arrastra una imagen<br>o haz clic para subir</span>
                    </div>
                    <label class="apariencia-label-upload">
                        <input type="file" accept="image/*" onchange="roleplayCargarImagen(event,this)" style="display:none">
                    </label>
                    <button class="apariencia-btn-borrar" onclick="roleplayBorrarImagen(this)" title="Quitar imagen" style="display:none">×</button>
                </div>
            </div>
    
            <!-- HISTORIA -->
            <div class="seccion-caja roleplay-historia">
                <h3 class="titulo-caja">Historia del Personaje</h3>
                <textarea class="roleplay-textarea-historia"
                          placeholder="Escribe aquí la historia de tu personaje: sus orígenes, motivaciones, secretos, aventuras pasadas..."
                          oninput="guardarDebounced()"></textarea>
            </div>
    
        </div>
    
        <!-- NOTAS CON TABS -->
        <div class="seccion-caja roleplay-notas">
            <h3 class="titulo-caja">Notas</h3>
    
            <!-- Barra de tabs -->
            <div class="notas-tabs-barra">
                <div class="notas-tabs-lista">
                    <button class="notas-tab activo" data-tab-id="diario" onclick="notasCambiarTab(this)">Diario</button>
                    <button class="notas-tab" data-tab-id="personas" onclick="notasCambiarTab(this)">Personas</button>
                    <button class="notas-tab" data-tab-id="lugares" onclick="notasCambiarTab(this)">Lugares</button>
                    <button class="notas-tab" data-tab-id="objetos" onclick="notasCambiarTab(this)">Objetos</button>
                    <button class="notas-tab" data-tab-id="sucesos" onclick="notasCambiarTab(this)">Sucesos</button>
                    <button class="notas-tab" data-tab-id="pistas" onclick="notasCambiarTab(this)">Pistas</button>
                </div>
                <button class="notas-tab-add" onclick="notasAñadirTab(this)" title="Añadir pestaña personalizada">＋</button>
            </div>
    
            <!-- Paneles de tabs fijos -->
            <div class="notas-panel activo" data-panel-id="diario">
                <textarea class="notas-textarea" placeholder="Tu diario de aventuras..." oninput="guardarDebounced()"></textarea>
            </div>
            <div class="notas-panel" data-panel-id="personas">
                <textarea class="notas-textarea" placeholder="NPCs, aliados, enemigos que has conocido..." oninput="guardarDebounced()"></textarea>
            </div>
            <div class="notas-panel" data-panel-id="lugares">
                <textarea class="notas-textarea" placeholder="Ciudades, mazmorras, tabernas, lugares importantes..." oninput="guardarDebounced()"></textarea>
            </div>
            <div class="notas-panel" data-panel-id="objetos">
                <textarea class="notas-textarea" placeholder="Objetos especiales, misiones pendientes, recompensas..." oninput="guardarDebounced()"></textarea>
            </div>
            <div class="notas-panel" data-panel-id="sucesos">
                <textarea class="notas-textarea" placeholder="Eventos importantes, batallas, decisiones clave..." oninput="guardarDebounced()"></textarea>
            </div>
            <div class="notas-panel" data-panel-id="pistas">
                <textarea class="notas-textarea" placeholder="Pistas, misterios sin resolver, rumores, teorías..." oninput="guardarDebounced()"></textarea>
            </div>
            <!-- Los tabs personalizados se insertan aquí dinámicamente -->
            <div class="notas-paneles-custom"></div>
    
        </div>
    
    </div><!-- fin quinta-pagina -->
